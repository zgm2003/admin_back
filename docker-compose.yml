version: '3.8'

services:
  # Webman 应用
  webman:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: webman-app
    ports:
      - "8787:8787"   # 主服务
      - "8788:8788"   # SSE 服务
    volumes:
      - .:/app                          # 代码热更新
      - /app/vendor                     # 排除 vendor 目录
      - ./runtime:/app/runtime          # 运行时目录
    extra_hosts:
      - "host.docker.internal:host-gateway"  # Linux 兼容
    networks:
      - webman-network
    restart: unless-stopped
    command: php start.php start

  # ========== 以下服务默认注释，如需使用 Docker 版 MySQL/Redis 请取消注释 ==========
  
  # # MySQL（Docker 版）
  # mysql:
  #   image: mysql:8.0
