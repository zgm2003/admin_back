  #     TZ: Asia/Shanghai
  #   volumes:
  #     - mysql-data:/var/lib/mysql
  #   networks:
  #     - webman-network
  #   restart: unless-stopped
  #   command: --default-authentication-plugin=mysql_native_password

  # # Redis（Docker 版）
  # redis:
  #   image: redis:7-alpine
  #   container_name: webman-redis
  #   ports:
  #     - "6380:6379"
  #   command: redis-server --requirepass 123456
  #   volumes:
  #     - redis-data:/data
  #   networks:
  #     - webman-network
  #   restart: unless-stopped

  # RabbitMQ（如果需要的话）
  # rabbitmq:
  #   image: rabbitmq:3-management
  #   container_name: webman-rabbitmq
  #   ports:
  #     - "5672:5672"
  #     - "15672:15672"
  #   environment:
  #     RABBITMQ_DEFAULT_USER: admin
  #     RABBITMQ_DEFAULT_PASS: admin
  #   networks:
  #     - webman-network
  #   restart: unless-stopped

networks:
  webman-network:
    driver: bridge

